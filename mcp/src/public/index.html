<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arko Studio &mdash; Setup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          animation: { 'slide-in': 'slideIn 0.3s ease-out forwards' },
          keyframes: {
            slideIn: {
              from: { transform: 'translateX(120%)', opacity: '0' },
              to:   { transform: 'translateX(0)',    opacity: '1' },
            },
          },
        },
      },
    }
  </script>
  <style>
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in-up { animation: fadeInUp 0.5s ease-out both; }
    .fade-delay-1 { animation-delay: 0.08s; }
    .fade-delay-2 { animation-delay: 0.16s; }
    .fade-delay-3 { animation-delay: 0.24s; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

  <!-- Background -->
  <div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-b from-emerald-950/20 via-slate-950 to-slate-950"></div>
    <div class="absolute -top-32 left-1/2 -translate-x-1/2 w-[700px] h-[500px] bg-emerald-500/[0.04] rounded-full blur-[120px]"></div>
  </div>

  <main class="max-w-lg mx-auto px-5 py-16">

    <!-- Header -->
    <header class="text-center mb-12 fade-in-up">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 mb-5">
        <span class="material-symbols-outlined text-emerald-400" style="font-size:28px">hub</span>
      </div>
      <h1 class="text-2xl font-bold tracking-tight mb-1.5">Arko Studio</h1>
      <p class="text-slate-500 text-sm">Configure your AI services to get started</p>
    </header>

    <!-- OpenAI -->
    <section class="bg-slate-900/50 border border-slate-800/50 rounded-2xl p-5 mb-3 fade-in-up fade-delay-1">
      <div class="flex items-center justify-between mb-5">
        <div class="flex items-center gap-2.5">
          <div class="flex items-center justify-center w-7 h-7 rounded-lg bg-amber-500/10">
            <span class="material-symbols-outlined text-amber-400" style="font-size:16px">bolt</span>
          </div>
          <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-300">OpenAI</h2>
        </div>
        <div class="flex items-center gap-2">
          <span id="openai-status" class="hidden text-xs"></span>
          <button onclick="testOpenai()" id="btn-test-openai"
            class="inline-flex items-center gap-1.5 px-2.5 py-1 text-xs font-medium rounded-lg bg-slate-800/80 text-slate-400 hover:bg-slate-700 hover:text-slate-200 transition-all border border-slate-700/40">
            <span class="material-symbols-outlined" style="font-size:14px">science</span>Test
          </button>
        </div>
      </div>

      <div class="space-y-3.5">
        <!-- API Key -->
        <div>
          <label for="openai_api_key" class="block text-xs font-medium text-slate-400 mb-1.5">API Key</label>
          <div class="relative">
            <input type="password" id="openai_api_key" placeholder="sk-..."
              class="w-full bg-slate-950/60 border border-slate-700/40 rounded-xl px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500/40 transition-all pr-10">
            <button type="button" onclick="toggleKey()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 hover:text-slate-400 transition-colors">
              <span id="eye-icon" class="material-symbols-outlined" style="font-size:18px">visibility_off</span>
            </button>
          </div>
        </div>

        <!-- Base URL -->
        <div>
          <label for="openai_base_url" class="block text-xs font-medium text-slate-400 mb-1.5">Base URL</label>
          <input type="url" id="openai_base_url" placeholder="https://api.openai.com/v1"
            class="w-full bg-slate-950/60 border border-slate-700/40 rounded-xl px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500/40 transition-all">
          <p class="text-[11px] text-slate-600 mt-1 ml-1">Compatible with any OpenAI-compatible API</p>
        </div>

        <!-- Models -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="openai_model_image" class="block text-xs font-medium text-slate-400 mb-1.5">Image Model</label>
            <input type="text" id="openai_model_image" placeholder="dall-e-3"
              class="w-full bg-slate-950/60 border border-slate-700/40 rounded-xl px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500/40 transition-all">
          </div>
          <div>
            <label for="openai_model_audio" class="block text-xs font-medium text-slate-400 mb-1.5">Audio Model</label>
            <input type="text" id="openai_model_audio" placeholder="gpt-4o-mini-audio"
              class="w-full bg-slate-950/60 border border-slate-700/40 rounded-xl px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500/40 transition-all">
          </div>
        </div>
      </div>
    </section>

    <!-- Ollama -->
    <section class="bg-slate-900/50 border border-slate-800/50 rounded-2xl p-5 mb-6 fade-in-up fade-delay-2">
      <div class="flex items-center justify-between mb-5">
        <div class="flex items-center gap-2.5">
          <div class="flex items-center justify-center w-7 h-7 rounded-lg bg-purple-500/10">
            <span class="material-symbols-outlined text-purple-400" style="font-size:16px">memory</span>
          </div>
          <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-300">Ollama</h2>
        </div>
        <div class="flex items-center gap-2">
          <span id="ollama-status" class="hidden text-xs"></span>
          <button onclick="testOllama()" id="btn-test-ollama"
            class="inline-flex items-center gap-1.5 px-2.5 py-1 text-xs font-medium rounded-lg bg-slate-800/80 text-slate-400 hover:bg-slate-700 hover:text-slate-200 transition-all border border-slate-700/40">
            <span class="material-symbols-outlined" style="font-size:14px">science</span>Test
          </button>
        </div>
      </div>

      <div class="space-y-3.5">
        <div>
          <label for="ollama_base_url" class="block text-xs font-medium text-slate-400 mb-1.5">Base URL</label>
          <input type="url" id="ollama_base_url" placeholder="http://localhost:11434"
            class="w-full bg-slate-950/60 border border-slate-700/40 rounded-xl px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500/40 transition-all">
        </div>
        <div>
          <label for="ollama_embedding_model" class="block text-xs font-medium text-slate-400 mb-1.5">Embedding Model</label>
          <input type="text" id="ollama_embedding_model" placeholder="mxbai-embed-large"
            class="w-full bg-slate-950/60 border border-slate-700/40 rounded-xl px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500/40 transition-all">
          <p class="text-[11px] text-slate-600 mt-1 ml-1">Used for RAG semantic embeddings</p>
        </div>
      </div>
    </section>

    <!-- Stitch -->
    <section class="bg-slate-900/50 border border-slate-800/50 rounded-2xl p-5 mb-6 fade-in-up fade-delay-3">
      <div class="flex items-center justify-between mb-5">
        <div class="flex items-center gap-2.5">
          <div class="flex items-center justify-center w-7 h-7 rounded-lg bg-blue-500/10">
            <span class="material-symbols-outlined text-blue-400" style="font-size:16px">cable</span>
          </div>
          <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-300">Google Stitch</h2>
        </div>
        <div class="flex items-center gap-2">
          <span id="stitch-status" class="hidden text-xs"></span>
          <button onclick="testStitch()" id="btn-test-stitch"
            class="inline-flex items-center gap-1.5 px-2.5 py-1 text-xs font-medium rounded-lg bg-slate-800/80 text-slate-400 hover:bg-slate-700 hover:text-slate-200 transition-all border border-slate-700/40">
            <span class="material-symbols-outlined" style="font-size:14px">science</span>Test
          </button>
        </div>
      </div>

      <div>
        <label for="stitch_api_key" class="block text-xs font-medium text-slate-400 mb-1.5">API Key</label>
        <div class="relative">
          <input type="password" id="stitch_api_key" placeholder="AIza..."
            class="w-full bg-slate-950/60 border border-slate-700/40 rounded-xl px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500/40 transition-all pr-10">
          <button type="button" onclick="toggleStitchKey()"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 hover:text-slate-400 transition-colors">
            <span id="stitch-eye-icon" class="material-symbols-outlined" style="font-size:18px">visibility_off</span>
          </button>
        </div>
        <p class="text-[11px] text-slate-600 mt-1 ml-1">Proxies Google Stitch tools into Arko's MCP server</p>
      </div>
    </section>

    <!-- Save -->
    <button onclick="save()" id="btn-save"
      class="w-full flex items-center justify-center gap-2.5 px-5 py-3 bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-white font-semibold rounded-xl transition-all shadow-lg shadow-emerald-600/20 hover:shadow-emerald-500/30 fade-in-up" style="animation-delay:0.32s">
      <span class="material-symbols-outlined" style="font-size:20px">save</span>
      Save Configuration
    </button>

    <!-- Footer -->
    <p class="text-center text-slate-600 text-[11px] mt-5">
      Configuration stored at <code class="text-slate-500 bg-slate-900/50 px-1.5 py-0.5 rounded">~/.arcaelas/mcp/config.json</code>
    </p>
  </main>

  <!-- Toast -->
  <div id="toast-container" class="fixed bottom-5 right-5 flex flex-col gap-2 z-50"></div>

  <script>
    const FIELDS = [
      'openai_api_key', 'openai_base_url', 'openai_model_image',
      'openai_model_audio', 'ollama_base_url', 'ollama_embedding_model',
      'stitch_api_key',
    ];

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('/api/config');
        const config = await res.json();
        FIELDS.forEach(id => {
          const el = document.getElementById(id);
          if (el && config[id]) el.value = config[id];
        });
      } catch {
        showToast('Failed to load configuration', 'error');
      }
    });

    function toggleKey() {
      const input = document.getElementById('openai_api_key');
      const icon = document.getElementById('eye-icon');
      const hidden = input.type === 'password';
      input.type = hidden ? 'text' : 'password';
      icon.textContent = hidden ? 'visibility' : 'visibility_off';
    }

    function toggleStitchKey() {
      const input = document.getElementById('stitch_api_key');
      const icon = document.getElementById('stitch-eye-icon');
      const hidden = input.type === 'password';
      input.type = hidden ? 'text' : 'password';
      icon.textContent = hidden ? 'visibility' : 'visibility_off';
    }

    async function testStitch() {
      const btn = document.getElementById('btn-test-stitch');
      const status = document.getElementById('stitch-status');
      setTestState(btn, status, 'loading');
      try {
        const res = await fetch('/api/test/stitch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            key: document.getElementById('stitch_api_key').value,
          }),
        });
        const data = await res.json();
        setTestState(btn, status, data.ok ? 'success' : 'error', data.ok ? 'Connected' : data.error);
      } catch (err) {
        setTestState(btn, status, 'error', err.message);
      }
    }

    async function testOpenai() {
      const btn = document.getElementById('btn-test-openai');
      const status = document.getElementById('openai-status');
      setTestState(btn, status, 'loading');
      try {
        const res = await fetch('/api/test/openai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            key: document.getElementById('openai_api_key').value,
            base_url: document.getElementById('openai_base_url').value,
          }),
        });
        const data = await res.json();
        setTestState(btn, status, data.ok ? 'success' : 'error', data.ok ? 'Connected' : data.error);
      } catch (err) {
        setTestState(btn, status, 'error', err.message);
      }
    }

    async function testOllama() {
      const btn = document.getElementById('btn-test-ollama');
      const status = document.getElementById('ollama-status');
      setTestState(btn, status, 'loading');
      try {
        const res = await fetch('/api/test/ollama', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: document.getElementById('ollama_base_url').value,
          }),
        });
        const data = await res.json();
        const msg = data.ok ? `${data.models.length} models available` : data.error;
        setTestState(btn, status, data.ok ? 'success' : 'error', msg);
      } catch (err) {
        setTestState(btn, status, 'error', err.message);
      }
    }

    async function save() {
      const btn = document.getElementById('btn-save');
      const original = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-size:20px">progress_activity</span>Saving\u2026';
      try {
        const config = {};
        FIELDS.forEach(id => { config[id] = document.getElementById(id).value; });
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(config),
        });
        const data = await res.json();
        showToast(data.ok ? 'Configuration saved' : 'Failed to save', data.ok ? 'success' : 'error');
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = original;
      }
    }

    function setTestState(btn, status, state, message) {
      if (state === 'loading') {
        btn.disabled = true;
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-size:14px">progress_activity</span>';
        status.className = 'hidden text-xs';
        return;
      }
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px">science</span>Test';
      if (state === 'success') {
        status.className = 'inline-flex items-center gap-1 px-2 py-0.5 text-xs rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20';
        status.innerHTML = '<span class="material-symbols-outlined" style="font-size:12px">check_circle</span>' + (message || 'OK');
      } else {
        status.className = 'inline-flex items-center gap-1 px-2 py-0.5 text-xs rounded-full bg-red-500/10 text-red-400 border border-red-500/20 max-w-[180px] truncate';
        status.innerHTML = '<span class="material-symbols-outlined" style="font-size:12px">error</span>' + (message || 'Error');
      }
      setTimeout(() => { status.className = 'hidden text-xs'; status.innerHTML = ''; }, 6000);
    }

    function showToast(message, type) {
      const container = document.getElementById('toast-container');
      const colors = { success: 'text-emerald-400', error: 'text-red-400', info: 'text-slate-400' };
      const icons  = { success: 'check_circle',     error: 'error',        info: 'info' };
      const el = document.createElement('div');
      el.className = 'flex items-center gap-2.5 px-4 py-3 rounded-xl bg-slate-800/95 border border-slate-700/50 shadow-2xl backdrop-blur-sm animate-slide-in';
      el.innerHTML = `<span class="material-symbols-outlined ${colors[type] || colors.info}" style="font-size:18px">${icons[type] || icons.info}</span><span class="text-sm text-slate-200">${message}</span>`;
      container.appendChild(el);
      setTimeout(() => {
        el.style.animation = 'slideOut 0.3s ease-in forwards';
        setTimeout(() => el.remove(), 300);
      }, 3500);
    }
  </script>
</body>
</html>
