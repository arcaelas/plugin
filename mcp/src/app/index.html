<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arko Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#09090b;--surface:rgba(255,255,255,.03);--surface-h:rgba(255,255,255,.05);
      --raised:#131318;--border:rgba(255,255,255,.07);--border-h:rgba(255,255,255,.13);
      --border-f:rgba(52,211,153,.4);--text:#eeeef0;--text-s:#8b8b9e;--text-d:#4b4b5e;
      --accent:#34d399;--accent-s:rgba(52,211,153,.1);--accent-b:rgba(52,211,153,.2);
      --amber:#fbbf24;--amber-s:rgba(251,191,36,.1);--amber-b:rgba(251,191,36,.18);
      --purple:#a78bfa;--purple-s:rgba(167,139,250,.1);--purple-b:rgba(167,139,250,.18);
      --red:#f87171;--red-s:rgba(248,113,113,.1);--red-b:rgba(248,113,113,.18);
      --blue:#60a5fa;--blue-s:rgba(96,165,250,.1);--blue-b:rgba(96,165,250,.18);
      --r:12px;--rs:9px
    }
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

    .topbar{position:sticky;top:0;z-index:60;background:rgba(9,9,11,.82);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .topbar-inner{max-width:660px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px}
    .brand-mark{width:28px;height:28px;border-radius:8px;background:var(--accent-s);border:1px solid var(--accent-b);display:flex;align-items:center;justify-content:center}
    .brand-mark .material-symbols-outlined{font-size:16px;color:var(--accent)}
    .brand-name{font-size:15px;font-weight:700;letter-spacing:-.01em}
    .save-btn{display:flex;align-items:center;gap:7px;padding:7px 16px;font-size:13px;font-weight:600;font-family:inherit;background:var(--accent);color:#0a0a0f;border:none;border-radius:8px;cursor:pointer;transition:opacity .2s,transform .15s}
    .save-btn:hover{opacity:.88;transform:translateY(-1px)}.save-btn:active{transform:translateY(0)}
    .save-btn:disabled{opacity:.4;pointer-events:none;transform:none}
    .save-btn .material-symbols-outlined{font-size:16px}

    .wrap{max-width:660px;margin:0 auto;padding:0 24px 48px}
    .section{padding:36px 0 28px}.section+.section{border-top:1px solid var(--border)}
    .section-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px}
    .section-icon{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .section-icon .material-symbols-outlined{font-size:18px}
    .section-icon.green{background:var(--accent-s);border:1px solid var(--accent-b)}.section-icon.green .material-symbols-outlined{color:var(--accent)}
    .section-icon.purple{background:var(--purple-s);border:1px solid var(--purple-b)}.section-icon.purple .material-symbols-outlined{color:var(--purple)}
    .section-icon.amber{background:var(--amber-s);border:1px solid var(--amber-b)}.section-icon.amber .material-symbols-outlined{color:var(--amber)}
    .section-icon.blue{background:var(--blue-s);border:1px solid var(--blue-b)}.section-icon.blue .material-symbols-outlined{color:var(--blue)}
    .section-info{flex:1;min-width:0}.section-info h2{font-size:14px;font-weight:700;margin-bottom:3px}.section-info p{font-size:12px;color:var(--text-s);line-height:1.4}
    .section-actions{display:flex;gap:8px;flex-shrink:0;padding-top:2px}

    .field{margin-bottom:14px}.field:last-child{margin-bottom:0}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .field-label-row label{margin-bottom:0}
    label{display:block;font-size:11px;font-weight:600;color:var(--text-s);margin-bottom:6px;letter-spacing:.02em;text-transform:uppercase}
    input[type="text"],input[type="url"],input[type="password"]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 13px;font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
    input::placeholder{color:var(--text-d)}input:focus{border-color:var(--border-f);box-shadow:0 0 0 3px rgba(52,211,153,.06)}
    input:disabled{opacity:.5}
    input.pr-btn{padding-right:38px}
    .input-wrap{position:relative}
    .toggle-vis{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-d);padding:0;line-height:1;transition:color .2s}
    .toggle-vis:hover{color:var(--text-s)}.toggle-vis .material-symbols-outlined{font-size:17px}
    .hint{font-size:11px;color:var(--text-d);margin-top:5px}

    .menu{position:relative}
    .menu-trigger{display:flex;align-items:center;gap:8px;width:100%;padding:9px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:border-color .2s;text-align:left}
    .menu-trigger:hover{border-color:var(--border-h)}
    .menu.open .menu-trigger{border-color:var(--border-f);box-shadow:0 0 0 3px rgba(52,211,153,.06)}
    .menu-icon{font-size:16px;color:var(--text-s);flex-shrink:0}
    .menu-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .menu-arrow{font-size:18px;color:var(--text-d);transition:transform .25s;flex-shrink:0}
    .menu.open .menu-arrow{transform:rotate(180deg)}
    .menu-panel{position:absolute;top:calc(100% + 5px);left:0;right:0;min-width:200px;background:var(--raised);border:1px solid var(--border-h);border-radius:var(--r);padding:5px;z-index:50;opacity:0;transform:translateY(-6px) scale(.97);pointer-events:none;transition:all .2s cubic-bezier(.16,1,.3,1);box-shadow:0 16px 48px rgba(0,0,0,.55)}
    .menu.open .menu-panel{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
    .menu-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;background:none;border:none;border-radius:7px;color:var(--text-s);cursor:pointer;transition:background .12s,color .12s;text-align:left;font-family:inherit;font-size:13px}
    .menu-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
    .menu-item.selected{background:var(--accent-s);color:var(--accent)}
    .menu-item .material-symbols-outlined{font-size:17px;flex-shrink:0}
    .menu-item-name{font-weight:500}.menu-item-hint{font-size:11px;color:var(--text-d);margin-top:1px}
    .menu-item.selected .menu-item-hint{color:var(--accent-b)}
    .menu-empty{padding:14px;font-size:12px;color:var(--text-d);text-align:center}

    .combobox{position:relative;flex:1;min-width:0}
    .combo-panel{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--raised);border:1px solid var(--border-h);border-radius:var(--r);padding:4px;z-index:50;max-height:180px;overflow-y:auto;display:none;box-shadow:0 12px 40px rgba(0,0,0,.5)}
    .combobox.open .combo-panel{display:block;animation:menuIn .15s ease-out}
    @keyframes menuIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    .combo-item{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;background:none;border:none;border-radius:6px;color:var(--text-s);cursor:pointer;font-size:13px;font-family:inherit;text-align:left;transition:background .1s}
    .combo-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
    .combo-item .material-symbols-outlined{font-size:15px}
    .combo-empty{padding:12px;font-size:12px;color:var(--text-d);text-align:center}

    .provider-entry{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--text-d);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;animation:slideIn .25s ease-out;transition:opacity .2s,transform .2s,border-color .2s}
    .provider-entry:last-child{margin-bottom:0}
    .provider-entry[data-provider="openai"]{border-left-color:var(--amber)}
    .provider-entry[data-provider="claude"]{border-left-color:var(--accent)}
    .provider-entry[data-provider="claude-code"]{border-left-color:var(--purple)}
    .provider-top{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .provider-name-input{flex:1;min-width:0}
    .provider-type-wrap{width:170px;flex-shrink:0}
    .btn-delete{display:flex;align-items:center;justify-content:center;width:30px;height:30px;flex-shrink:0;background:none;border:1px solid transparent;border-radius:7px;color:var(--text-d);cursor:pointer;transition:all .15s}
    .btn-delete:hover{background:var(--red-s);border-color:var(--red-b);color:var(--red)}
    .btn-delete .material-symbols-outlined{font-size:16px}
    .provider-bottom{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .provider-bottom.no-key{grid-template-columns:1fr}
    .provider-models{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)}
    .provider-models-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .provider-models-grid .field{margin-bottom:0}
    .empty-state{text-align:center;padding:24px 16px;color:var(--text-d)}
    .empty-state .material-symbols-outlined{font-size:28px;display:block;margin-bottom:6px;opacity:.4}
    .empty-state p{font-size:12px}

    .ollama-fields{display:grid;grid-template-columns:1.3fr 1fr;gap:10px}
    .combo-action{display:flex;gap:6px;align-items:flex-start}
    .combo-action .btn-ghost{padding:9px 10px;flex-shrink:0}

    input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:5px;background:rgba(255,255,255,.08);border-radius:3px;outline:none;cursor:pointer;background-image:linear-gradient(var(--accent),var(--accent));background-size:calc(var(--val,.7)*100%) 100%;background-repeat:no-repeat}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--accent);border-radius:50%;border:3px solid var(--bg);box-shadow:0 0 0 1px var(--accent-b),0 2px 6px rgba(52,211,153,.3);cursor:pointer}
    input[type="range"]::-moz-range-thumb{width:18px;height:18px;background:var(--accent);border-radius:50%;border:3px solid var(--bg);box-shadow:0 0 0 1px var(--accent-b),0 2px 6px rgba(52,211,153,.3);cursor:pointer}
    input[type="range"]::-moz-range-track{height:5px;background:transparent;border:none}
    .score-val{font-size:14px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}

    .btn-ghost{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;font-size:11px;font-weight:600;font-family:inherit;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text-s);cursor:pointer;transition:all .15s;white-space:nowrap}
    .btn-ghost:hover{background:var(--surface-h);color:var(--text);border-color:var(--border-h)}
    .btn-ghost:disabled{opacity:.35;pointer-events:none}.btn-ghost .material-symbols-outlined{font-size:14px}

    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;font-size:11px;font-weight:500;border-radius:20px}
    .badge.ok{background:var(--accent-s);color:var(--accent);border:1px solid var(--accent-b)}
    .badge.err{background:var(--red-s);color:var(--red);border:1px solid var(--red-b)}
    .badge.warn{background:var(--amber-s);color:var(--amber);border:1px solid var(--amber-b)}
    .badge .material-symbols-outlined{font-size:12px}.badge-text{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .progress{margin-top:10px;display:none}.progress.visible{display:block}
    .progress-track{width:100%;height:4px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden}
    .progress-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .3s;width:0}
    .progress-fill.pulse{width:100%!important;background:linear-gradient(90deg,transparent 0%,var(--accent) 50%,transparent 100%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .progress-label{font-size:11px;color:var(--text-d);margin-top:6px}
    .model-status{margin-top:8px}

    .skeleton-block{background:linear-gradient(90deg,rgba(255,255,255,.02) 25%,rgba(255,255,255,.05) 50%,rgba(255,255,255,.02) 75%);background-size:200% 100%;animation:shimmer 1.8s ease-in-out infinite;border-radius:var(--rs)}
    .sk-section{padding:36px 0}.sk-section+.sk-section{border-top:1px solid var(--border)}
    .sk-h{height:16px;width:25%;margin-bottom:18px}.sk-input{height:38px;width:100%;margin-bottom:12px}
    .sk-row{display:flex;gap:10px}.sk-half{height:38px;flex:1}

    .toast-container{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:100}
    .toast{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:var(--rs);background:var(--raised);border:1px solid var(--border-h);box-shadow:0 12px 40px rgba(0,0,0,.5);animation:toastIn .25s ease-out forwards}
    .toast .material-symbols-outlined{font-size:18px}.toast span:last-child{font-size:13px}
    @keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin .8s linear infinite;display:inline-block}
    .footer{text-align:center;font-size:11px;color:var(--text-d);padding:12px 0 0}
    .footer code{font-family:'SF Mono','Fira Code',monospace;font-size:10px;color:var(--text-s);background:var(--surface);padding:2px 8px;border-radius:6px;border:1px solid var(--border)}

    .wa-list{display:flex;flex-direction:column;gap:8px}
    .wa-entry{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;animation:slideIn .25s ease-out}
    .wa-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent-s);border:1px solid var(--accent-b);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .wa-avatar .material-symbols-outlined{font-size:18px;color:var(--accent)}
    .wa-info{flex:1;min-width:0}
    .wa-phone{font-size:13px;font-weight:600;color:var(--text)}
    .wa-meta{display:flex;align-items:center;gap:8px;margin-top:2px}
    .wa-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text-d)}
    .wa-status .dot{width:6px;height:6px;border-radius:50%}
    .wa-status .dot.ok{background:var(--accent)}
    .wa-status .dot.warn{background:var(--amber);animation:blink 1.5s infinite}
    .wa-status .dot.off{background:var(--text-d)}
    .wa-unread{font-size:10px;font-weight:700;background:var(--accent);color:#0a0a0f;border-radius:10px;padding:1px 7px;line-height:1.5}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    .wa-pairing{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-top:12px;animation:slideIn .25s ease-out}
    .wa-pair-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .wa-pair-head .field{flex:1;margin:0}
    .wa-pair-close{display:flex;align-items:center;justify-content:center;width:30px;height:30px;flex-shrink:0;background:none;border:1px solid transparent;border-radius:7px;color:var(--text-d);cursor:pointer;transition:all .15s}
    .wa-pair-close:hover{background:var(--red-s);border-color:var(--red-b);color:var(--red)}
    .wa-pair-close .material-symbols-outlined{font-size:16px}
    .wa-pair-body{text-align:center;padding:8px 0}
    .wa-pair-status{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--text-s);padding:8px 16px;border-radius:20px;background:var(--raised)}
    .wa-pair-code{font-family:'SF Mono',Monaco,'Cascadia Code',monospace;font-size:32px;font-weight:700;letter-spacing:5px;color:var(--accent);padding:16px 0;margin:12px 0;border:1px dashed var(--border);border-radius:var(--r);background:var(--raised)}
    .wa-pair-instructions{font-size:12px;color:var(--text-d);line-height:1.6;margin-bottom:16px}
    .wa-pair-instructions strong{color:var(--text-s)}
    .wa-pair-timer{font-size:11px;color:var(--text-d);margin-top:8px}
    .wa-pair-success{color:var(--accent);font-size:14px;font-weight:500;margin-top:8px}
    .wa-pair-error{color:var(--red);font-size:12px;margin-top:8px}
    .wa-pair-actions{margin-top:12px}
    .wa-input-row{display:flex;gap:8px}
    .wa-input-row input{flex:1;min-width:0}
    .wa-input-row .btn-ghost{padding:9px 14px;flex-shrink:0}

    @media(max-width:560px){
      .wrap{padding:0 16px 32px}.topbar-inner{padding:12px 16px}.section{padding:28px 0 22px}
      .field-row,.provider-bottom,.ollama-fields,.provider-models-grid{grid-template-columns:1fr}
      .provider-top{flex-wrap:wrap}.provider-name-input{flex-basis:calc(100% - 42px)}.provider-type-wrap{width:100%;order:3}
      .combo-action{flex-wrap:wrap}
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
